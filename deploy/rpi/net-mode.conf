###############################################################################
# /etc/quarcs/net-mode.conf
#
# 说明：
# - 本文件会被 `/usr/local/sbin/net-mode.sh` source
# - 请按你树莓派当前 NetworkManager 的连接 profile 名称填写
# - profile 名称包含空格/中文都可以（脚本已正确引用）
###############################################################################

# 热点(AP)连接 profile 名（你当前是：RaspBerryPi-WiFi）
AP_CON="RaspBerryPi-WiFi"

# 以太网连接 profile 名（示例：有线连接 1；没有就留空）
WAN_ETH="有线连接 1"

# 上级 Wi‑Fi 连接 profile 名（你可以提前用 nmcli 创建/保存多个）
# 例如：("wan-home" "wan-phone")
# 推荐：让软件保存的 Wi‑Fi 都写进一个固定 profile（默认 `wan-uplink`）
# 然后 WAN 模式会自动尝试该 profile
WAN_WIFIS=("wan-uplink" "wan-home" "wan-phone")

# 网卡接口名（一般默认 wlan0/eth0）
WLAN_IF="wlan0"
ETH_IF="eth0"

# WAN 尝试超时（秒）
WAN_TIMEOUT_SEC=75

# 连通性探测目标
PING_TARGET="1.1.1.1"

# ZeroTier 服务名（Raspberry Pi OS 默认是 zerotier-one）
ZT_SERVICE="zerotier-one"

# syslog tag
LOG_TAG="net-mode"

